<!DOCTYPE html>
<html>
<head>
  <title>Viri Bridge Info</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 30px;
      background: #09090b;
      color: #f8fafc;
      text-align: center;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: #18181b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    h1 {
      color: #10b981;
      font-size: 20px;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .id-box {
      background: #09090b;
      border: 1px solid #27272a;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      color: #3b82f6;
      word-break: break-all;
      margin: 15px 0;
      user-select: all;
    }
    .copied-msg {
      font-size: 11px;
      color: #10b981;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Viri Bridge Companion</h1>
    <p>Use the Extension ID below to configure this terminal in settings:</p>
    <div class="id-box" id="ext-id">Detecting...</div>
    <p style="font-size: 11px; color: #64748b;">Copy and paste this ID into the Cashier settings input field on this device.</p>
  </div>

  <script>
    const id = chrome.runtime.id;
    const box = document.getElementById('ext-id');
    if (id) {
      box.textContent = id;
    } else {
      box.textContent = 'Not found';
    }
  </script>
</body>
</html>
