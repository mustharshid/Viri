        <script>


            $('.profile-card').on('click', function () {
                //location.href = 'index.html';
                
                let x = {
                    'rTag':this.dataset.rt,
                    'profileId':this.dataset.profileid,
                    'profileType':this.dataset.profiletype
                };
                
                changeProfile(x);
                
                //location.href = 'dashboard';

            });
            
            let getLandingPage = function(landingPageOption){
                let landingPage  = "https://faisanet.mib.com.mv/profiles";
                switch (landingPageOption) {
                    case "0": {
                        //individual account login

                        landingPage = "https://faisanet.mib.com.mv/accounts"; //dashboard
                        break;

                    }
                    case "1": {
                        //profiles

                        landingPage = "https://faisanet.mib.com.mv/accounts";
                        break;

                    }
                    case "2": {

                        //quick

                        landingPage = "https://faisanet.mib.com.mv/transfer/quick";
                        break;

                    }
                    case "3": {
                        //local

                        landingPage = "https://faisanet.mib.com.mv/transfer/local";
                        break;

                    }
                    default: {  
                        //profiles

                        landingPage = "https://faisanet.mib.com.mv/profiles";
                    }
                }
                
                return landingPage;
            }
            
            
            let changeProfile = function (submitData) {
                actionBlocker.blockActions();

                $.ajax({
                    type: 'POST',
                    url: "https://faisanet.mib.com.mv/aProfileHandler/switchProfile",
                    data: submitData,
                    success: function (data, textStatus, request) {
                        actionBlocker.unblockActions();
                        //hideProgress();
                        let responseData = (JSON.parse(request.responseText));
                        console.log(data, textStatus, request);
                        console.log(responseData);
                        

                        //window.location = "https://faisanet.mib.com.mv/dashboard";
                        let landingPageOption = responseData.landingPage;
                        let landingPage = getLandingPage(landingPageOption);
                        window.location = landingPage;

                    },
                    error: function (request, textStatus, errorThrown) {
                        actionBlocker.unblockActions();
                        if (request.status == 419) {
                            window.location = 'https://faisanet.mib.com.mv/';
                            return;
                        }

                        let responseData = (JSON.parse(request.responseText));
                        notif({
                            type: "error",
                            msg: `${responseData.reasonText}`,
                            position: "center",
                            width: 500,
                            height: 60,
                            autohide: false
                        });




                    }
                });
            };
            
        </script>
        
        
        <script>

            var logout = function () {
                actionBlocker.blockActions();

                $.ajax({
                    type: 'POST',
                    url: "https://faisanet.mib.com.mv/aAuth/logout",
                    data: {
                    },

                    success: function (data, textStatus, request) {
                        actionBlocker.unblockActions();
                        window.location = 'https://faisanet.mib.com.mv/';

                    },
                    error: function (request, textStatus, errorThrown) {
                        actionBlocker.unblockActions();
                        var responseData = (JSON.parse(request.responseText));
                        //handling session expiry
                        if (request.status == 419) {
                            window.location = 'https://faisanet.mib.com.mv/';
                        }
                        notif({
                            type: "error",
                            msg: `${responseData.reasonText}`,
                            position: "center",
                            width: 500,
                            height: 60,
                            autohide: false
                        });


                    }
                });

            };
        </script>
